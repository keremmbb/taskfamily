<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Görevlerim | TaskFamily</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --success: #10b981;
            --warning: #f59e0b;
            --bg: #f0f2f5;
            --card-bg: rgba(255, 255, 255, 0.95);
            --text-dark: #1e293b;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            background-attachment: fixed;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        /* Üst Header Alanı */
        .page-header {
            text-align: center;
            color: white;
            margin-bottom: 40px;
            margin-top: 20px;
        }

        /* Ana Menü Kartı (Görevlerim Butonu) */
        .menu-grid {
            display: flex;
            justify-content: center;
            width: 100%;
            max-width: 400px;
        }

        .action-card {
            background: var(--card-bg);
            padding: 40px;
            border-radius: 30px;
            text-align: center;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
            width: 100%;
            border: 3px solid transparent;
        }

        .action-card:hover {
            transform: translateY(-10px) scale(1.02);
            border-color: var(--primary);
            background: white;
        }

        .action-card .icon-circle {
            width: 80px;
            height: 80px;
            background: #eef2ff;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            font-size: 40px;
        }

        /* Modern Modal (Pencere) Tasarımı */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(12px);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            padding: 20px;
        }

        .task-modal {
            background: #f8fafc;
            width: 100%;
            max-width: 500px;
            max-height: 80vh;
            border-radius: 32px;
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            animation: modalSlideUp 0.4s ease-out;
        }

        @keyframes modalSlideUp {
            from { transform: translateY(100px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .modal-header {
            padding: 25px;
            background: white;
            border-bottom: 1px solid #e2e8f0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .modal-body {
            padding: 20px;
            overflow-y: auto;
            flex: 1;
        }

        .close-modal {
            background: #f1f5f9;
            border: none;
            width: 35px;
            height: 35px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.2s;
        }

        .close-modal:hover { background: #fee2e2; color: #ef4444; }

        /* Görev Kartları (Pencere İçindekiler) */
        .task-card {
            background: white;
            padding: 18px;
            margin-bottom: 12px;
            border-radius: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid #edf2f7;
            transition: 0.2s;
        }

        .task-info { display: flex; align-items: center; gap: 12px; }
        .task-icon { font-size: 24px; }
        .task-title { font-weight: 600; color: var(--text-dark); }

        .done-btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 10px 18px;
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
        }

        .done-btn.completed {
            background: var(--success);
            cursor: default;
        }

        /* Çıkış ve Şifre Uyarıları */
        .logout-trigger {
            position: fixed; top: 20px; right: 20px;
            background: rgba(255, 255, 255, 0.2);
            color: white; border: 1px solid rgba(255, 255, 255, 0.3);
            padding: 8px 18px; border-radius: 12px; cursor: pointer;
            backdrop-filter: blur(5px); font-weight: 600;
        }

        #setup-alert {
            display: none;
            background: #fffbeb;
            border: 2px solid #fbbf24;
            padding: 15px 25px;
            border-radius: 20px;
            margin-bottom: 20px;
            max-width: 400px;
            width: 100%;
            animation: pulse 2s infinite;
        }

        @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.03); } }

        .alert-btn {
            background: #fbbf24; border: none; padding: 8px 15px;
            border-radius: 10px; font-weight: 700; cursor: pointer; margin-left: 10px;
        }
    </style>
</head>
<body>

<button class="logout-trigger" onclick="toggleLogoutModal(true)">Çıkış Yap</button>

<div class="page-header">
    <h1 style="font-size: 2.5rem; margin-bottom: 10px;">TaskFamily</h1>
    <p style="opacity: 0.9;">Hoş geldin Kahraman, bugün neler yapıyoruz?</p>
</div>

<div id="setup-alert">
    <div style="display: flex; align-items: center; justify-content: space-between;">
        <span style="color: #92400e; font-weight: 600;">🔑 Şifreni belirlemelisin!</span>
        <button class="alert-btn" onclick="updatePassword()">Şimdi Yap</button>
    </div>
</div>

<div class="menu-grid">
    <div class="action-card" onclick="openTasksModal()">
        <div class="icon-circle">📋</div>
        <h2 style="margin: 0; color: #1e293b;">Görevlerim</h2>
        <p style="color: #64748b; margin-top: 10px;">Sana verilen işleri listele ve tamamla.</p>
    </div>
</div>

<div id="tasksModal" class="modal-overlay">
    <div class="task-modal">
        <div class="modal-header">
            <h2 style="margin: 0; font-size: 22px;">🎯 Günlük Görevlerin</h2>
            <button class="close-modal" onclick="closeTasksModal()">&times;</button>
        </div>
        <div class="modal-body" id="tasks-container">
            <div style="text-align: center; padding: 20px; color: #94a3b8;">Yükleniyor...</div>
        </div>
    </div>
</div>

<div id="logoutModal" class="modal-overlay">
    <div style="background: white; padding: 30px; border-radius: 24px; text-align: center; max-width: 350px;">
        <h3 style="margin-top: 0;">Çıkış Yapılsın mı? 🚪</h3>
        <p style="color: #64748b;">Dinlenmek için ayrılıyorsun, görüşmek üzere!</p>
        <div style="display: flex; gap: 10px; margin-top: 20px;">
            <button onclick="toggleLogoutModal(false)" style="flex: 1; padding: 12px; border-radius: 12px; border: none; background: #f1f5f9; cursor: pointer; font-weight: 600;">Vazgeç</button>
            <button onclick="confirmLogout()" style="flex: 1; padding: 12px; border-radius: 12px; border: none; background: #ef4444; color: white; cursor: pointer; font-weight: 600;">Çıkış Yap</button>
        </div>
    </div>
</div>

<script>
    const urlParams = new URLSearchParams(window.location.search);
    let childEmail = urlParams.get('email') || localStorage.getItem('userEmail');

    window.onload = function() {
        checkAlertStatus();
    };

    function checkAlertStatus() {
        const isFirst = localStorage.getItem('isFirstLogin');
        const alertBox = document.getElementById('setup-alert');
        if (isFirst === 'false') {
            alertBox.style.display = 'none';
        } else {
            alertBox.style.display = 'block';
        }
    }

    async function openTasksModal() {
        document.getElementById('tasksModal').style.display = 'flex';
        await loadMyTasks();
    }

    function closeTasksModal() {
        document.getElementById('tasksModal').style.display = 'none';
    }

   async function loadMyTasks() {
    const listDiv = document.getElementById('taskList');
    const email = new URLSearchParams(window.location.search).get('email');
    
    try {
        const res = await fetch(`/get-child-tasks?email=${encodeURIComponent(email)}`);
        const tasks = await res.json();
        
        if (tasks.length === 0) {
            listDiv.innerHTML = '<div class="no-tasks">Henüz görev atanmamış. 🎉</div>';
            return;
        }

        listDiv.innerHTML = tasks.map(t => `
            <div class="task-card ${t.status === 'completed' ? 'completed-task' : ''}">
                <div class="task-info">
                    <div class="task-title">${t.task_title}</div>
                    <div class="task-status">${t.status === 'completed' ? '✅ Tamamlandı' : '⏳ Devam Ediyor'}</div>
                </div>
                <div class="task-action">
                    ${t.status !== 'completed' 
                        ? `<button class="finish-btn" onclick="completeTask('${t.id}', this)">Bitti</button>` 
                        : '<span style="color: #10b981; font-weight: bold;">✓</span>'}
                </div>
            </div>
        `).join('');
    } catch (err) {
        listDiv.innerHTML = '<p>Görevler yüklenirken hata oluştu.</p>';
    }
}

    async function markAsDone(taskId, btn) {
        btn.innerText = "...";
        try {
            const res = await fetch('/complete-task', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ taskId })
            });
            if (res.ok) await loadMyTasks();
        } catch (err) { alert("Hata oluştu."); }
    }

    async function updatePassword() {
        const newPass = prompt("Lütfen yeni şifreni gir (en az 4 karakter):");
        if (!newPass || newPass.length < 4) return alert("Şifre çok kısa!");

        try {
            const res = await fetch('/update-child-password', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email: childEmail, newPassword: newPass })
            });
            const data = await res.json();
            if (data.success) {
                alert("Şifre güncellendi!");
                localStorage.setItem('isFirstLogin', 'false');
                checkAlertStatus();
            }
        } catch (err) { alert("Bağlantı hatası!"); }
    }

    function toggleLogoutModal(show) {
        document.getElementById('logoutModal').style.display = show ? 'flex' : 'none';
    }

    function confirmLogout() {
        localStorage.clear();
        window.location.href = "/index.html";
    }

    // Modal dışına tıklayınca kapatma
    window.onclick = function(e) {
        if (e.target.className === 'modal-overlay') {
            closeTasksModal();
            toggleLogoutModal(false);
        }
    }
    async function completeTask(taskId, buttonElement) {
    // 1. Kullanıcıya işlem yapıldığını hissettir
    buttonElement.disabled = true;
    buttonElement.innerText = "...";
    buttonElement.style.opacity = "0.5";

    try {
        const res = await fetch('/complete-task', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ taskId })
        });

        const data = await res.json();

        if (data.success) {
            // 2. Başarılıysa butonu hemen kaldır ve metni değiştir (Sayfa yenilenmesini beklemeden görsel geri bildirim)
            const parentAction = buttonElement.parentElement;
            parentAction.innerHTML = '<span style="color: #10b981; font-weight: bold;">✓</span>';
            
            // 3. Arka planda listeyi tekrar çekerek verilerin güncelliğinden emin ol
            setTimeout(() => loadMyTasks(), 500); 
        } else {
            alert("Hata: " + (data.error || "Güncellenemedi"));
            buttonElement.disabled = false;
            buttonElement.innerText = "Bitti";
            buttonElement.style.opacity = "1";
        }
    } catch (err) {
        console.error("Hata:", err);
        alert("Bağlantı hatası!");
        buttonElement.disabled = false;
        buttonElement.innerText = "Bitti";
        buttonElement.style.opacity = "1";
    }
}
</script>

</body>
</html>
