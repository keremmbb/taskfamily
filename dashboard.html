<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yönetim Paneli | TaskFamily</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        /* CSS BURAYA YAZILIR */
        :root { --primary: #4f46e5; --bg: #f8fafc; --text: #1e293b; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: var(--bg); color: var(--text); }
        
        nav { background: white; padding: 1rem 10%; display: flex; justify-content: space-between; border-bottom: 1px solid #e2e8f0; }
        .dashboard-grid { display: grid; grid-template-columns: 250px 1fr; gap: 30px; padding: 30px 10%; }
        
        /* Sidebar Tasarımı */
        .sidebar { background: white; padding: 20px; border-radius: 15px; border: 1px solid #e2e8f0; height: fit-content; }
        .sidebar li { list-style: none; padding: 12px; cursor: pointer; border-radius: 8px; color: #64748b; margin-bottom: 5px; transition: 0.3s; }
        .sidebar li:hover { background: #f1f5f9; }
        .sidebar li.active { background: #eef2ff; color: var(--primary); font-weight: 600; }
        
        .main-content { background: white; padding: 30px; border-radius: 20px; border: 1px solid #e2e8f0; min-height: 400px; }
        
        /* Bölümleri başlangıçta gizlemek için */
        .content-section { display: none; }
        .content-section.active { display: block; }

        .child-card { border: 1px solid #e2e8f0; padding: 15px; margin-bottom: 10px; border-radius: 12px; display: flex; justify-content: space-between; align-items: center; background: #f8fafc; }
        .logout-btn { padding: 8px 15px; border-radius: 8px; border: 1px solid #ff4757; color: #ff4757; cursor: pointer; background: none; }
        input { padding: 10px; border-radius: 8px; border: 1px solid #e2e8f0; margin-bottom: 10px; }
        @keyframes fadeIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
}

.fade-in-section {
    animation: fadeIn 0.5s ease-out forwards;
}
    </style>
</head>
<body>

    <nav>
        <div style="font-weight: 800; color: var(--primary); font-size: 1.2rem;">TaskFamily Panel</div>
        <button class="logout-btn" onclick="logout()">Çıkış Yap</button>
    </nav>

    <div class="dashboard-grid">
        <aside class="sidebar">
            <ul>
                <li class="active" onclick="showSection('summary-section', this)">🏠 Özet</li>
                <li onclick="showSection('children-section', this)">👶 Çocuklarım</li>
                <li onclick="showSection('tasks-section', this)">📋 Görevler / Görev Ata</li>
            </ul>
        </aside>
        
        <main class="main-content">
            <div id="summary-section" class="content-section active">
                <h2>Hoş Geldiniz! 👋</h2>
                <div style="margin-top: 20px; padding: 20px; background: #f0f4ff; border-radius: 12px;">
                    <h3>👶 Çocuk Davet Et</h3>
                    <input type="email" id="childEmail" placeholder="Çocuğun E-posta adresi" style="width: 100%; margin-top:10px;">
                    <button onclick="sendInvitation()" style="background: var(--primary); color: white; border: none; padding: 10px 20px; border-radius: 10px; cursor: pointer;">Davet Gönder</button>
                </div>
            </div>

            <div id="children-section" class="content-section">
                <h2>👶 Çocuklarım</h2>
                <div id="childrenList" style="margin-top: 20px;">
                    <p>Çocuklar yükleniyor...</p>
                </div>
            </div>

            <div id="tasks-section" class="content-section">
    <h2>📋 Görev Yönetimi</h2>
    
    <div style="display: flex; gap: 20px; margin: 20px 0;">
    <button id="btn-view" onclick="toggleTaskSubSection('view-tasks')" style="flex: 1; padding: 20px; border-radius: 15px; border: 2px solid #4f46e5; background: white; cursor: pointer; font-weight: 600; color: #4f46e5; transition: 0.3s;">
        🔍 Görevlerim (Verilen Görevler)
    </button>
    <button id="btn-assign" onclick="toggleTaskSubSection('assign-task')" style="flex: 1; padding: 20px; border-radius: 15px; border: none; background: #4f46e5; cursor: pointer; font-weight: 600; color: white; transition: 0.3s;">
        ➕ Görev Ata
    </button>
</div>

<div id="sub-assign-task" class="fade-in-section" style="display: none; background: #f8fafc; padding: 20px; border-radius: 15px; border: 1px solid #e2e8f0;">
    </div>

<div id="sub-view-tasks" class="fade-in-section" style="display: none; margin-top: 20px;">
    </div>
    </div>
</div>

<script>
    const parentId = localStorage.getItem('userId');

    // Bölüm değiştirme fonksiyonu (Sidebar çalışması için)
    function showSection(sectionId, element) {
        // Tüm bölümleri gizle
        document.querySelectorAll('.content-section').forEach(s => s.classList.remove('active'));
        // Seçilen bölümü göster
        document.getElementById(sectionId).classList.add('active');
        // Sidebar linklerini güncelle
        document.querySelectorAll('.sidebar li').forEach(li => li.classList.remove('active'));
        element.classList.add('active');

        if(sectionId === 'children-section') loadMyChildren();
        if(sectionId === 'tasks-section') loadSentTasks();
    }

    async function loadMyChildren() {
        const listDiv = document.getElementById('childrenList');
        try {
            const res = await fetch(`/get-my-children?parentId=${parentId}`);
            const children = await res.json();
            listDiv.innerHTML = children.length === 0 ? "Henüz çocuk yok." : 
                children.map(c => `
                    <div class="child-card">
                        <span>${c.email}</span>
                        <button onclick="removeChild('${c.id}')" style="color:red; border:none; cursor:pointer;">Sil</button>
                    </div>
                `).join('');
        } catch (e) { listDiv.innerHTML = "Hata oluştu."; }
    }

    async function sendInvitation() {
        const email = document.getElementById('childEmail').value;
        const res = await fetch('/invite-child', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email, parentId })
        });
        const data = await res.json();
        alert(data.message);
    }

    function logout() {
        localStorage.clear();
        window.location.href = "/index.html";
    }
   function toggleTaskSubSection(sub) {
    const assignDiv = document.getElementById('sub-assign-task');
    const viewDiv = document.getElementById('sub-view-tasks');
    const btnAssign = document.getElementById('btn-assign');
    const btnView = document.getElementById('btn-view');

    // Animasyonu sıfırlamak için sınıfları önce çıkarıp sonra ekleyeceğiz
    assignDiv.classList.remove('fade-in-section');
    viewDiv.classList.remove('fade-in-section');

    if (sub === 'assign-task') {
        assignDiv.style.display = 'block';
        viewDiv.style.display = 'none';
        
        // Buton stillerini değiştir (aktif/pasif görünümü)
        btnAssign.style.background = "#4f46e5"; btnAssign.style.color = "white";
        btnView.style.background = "white"; btnView.style.color = "#4f46e5";
        
        // Animasyonu tetikle
        void assignDiv.offsetWidth; // Reflow: Tarayıcıyı değişikliği fark etmeye zorlar
        assignDiv.classList.add('fade-in-section');
    } else {
        assignDiv.style.display = 'none';
        viewDiv.style.display = 'block';
        
        btnView.style.background = "#4f46e5"; btnView.style.color = "white";
        btnAssign.style.background = "white"; btnAssign.style.color = "#4f46e5";

        loadSentTasks();
        
        void viewDiv.offsetWidth; 
        viewDiv.classList.add('fade-in-section');
    }
}
async function loadSentTasks() {
    const listDiv = document.getElementById('parent-tasks-list');
    const pId = localStorage.getItem('userId');
    
    try {
        // server.js'deki /get-parent-tasks endpointini kullanıyoruz
        const res = await fetch(`/get-parent-tasks?parentId=${pId}`);
        const tasks = await res.json();
        
        if (tasks.length === 0) {
            listDiv.innerHTML = "<p>Henüz kimseye görev atamadınız.</p>";
            return;
        }

        listDiv.innerHTML = tasks.map(t => `
            <div class="child-card" style="margin-bottom: 8px;">
                <div>
                    <strong>${t.task_title}</strong> <br>
                    <small style="color: #64748b;">Durum: ${t.status === 'completed' ? '✅ Tamamlandı' : '⏳ Bekliyor'}</small>
                </div>
            </div>
        `).join('');
    } catch (e) {
        listDiv.innerHTML = "Görevler yüklenirken bir hata oluştu.";
    }
}
async function assignTask() {
    const title = document.getElementById('task-title').value;
    const childEmail = document.getElementById('target-child-email').value;
    const parentId = localStorage.getItem('userId');

    if(!title || !childEmail) return alert("Lütfen tüm alanları doldurun!");

    try {
        const res = await fetch('/add-task-by-email', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ title, childEmail, parentId })
        });
        const data = await res.json();
        
        if(data.success) {
            alert("Görev başarıyla gönderildi!");
            document.getElementById('task-title').value = "";
            toggleTaskSubSection('view-tasks'); // Otomatik listeye yönlendir
        } else {
            alert("Hata: " + data.error);
        }
    } catch (e) {
        alert("Bağlantı hatası!");
    }
}

    window.onload = () => { if(!parentId) window.location.href = "/index.html"; };
</script>
</body>
</html>
