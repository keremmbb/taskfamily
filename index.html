<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TaskFamily | Akıllı Görev Takibi</title>
    <style>
        :root { --primary: #4f46e5; --primary-hover: #4338ca; --bg: #f8fafc; --text-main: #1e293b; --text-muted: #64748b; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background-color: var(--bg); color: var(--text-main); line-height: 1.6; }
        nav { background: white; padding: 1rem 10%; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #e2e8f0; position: sticky; top: 0; z-index: 1000; }
        .logo { font-size: 1.5rem; font-weight: 800; color: var(--primary); }
        .nav-buttons button { padding: 0.6rem 1.2rem; margin-left: 0.8rem; border-radius: 10px; font-weight: 600; cursor: pointer; border: none; }
        .btn-login { background: transparent; color: var(--text-main); }
        .btn-register { background: var(--primary); color: white; }
        .hero { padding: 120px 10%; text-align: center; }
        .modal-overlay { position: fixed; inset: 0; background: rgba(15, 23, 42, 0.5); display: none; justify-content: center; align-items: center; z-index: 2000; }
        .auth-container { background: white; padding: 2.5rem; border-radius: 24px; width: 100%; max-width: 420px; position: relative; }
        .close-btn { position: absolute; top: 1.2rem; right: 1.2rem; font-size: 1.5rem; border: none; background: none; cursor: pointer; }
        input { width: 100%; padding: 0.8rem; margin-bottom: 1rem; border: 1.5px solid #e2e8f0; border-radius: 12px; }
        .submit-btn { width: 100%; padding: 0.9rem; background: var(--primary); color: white; border: none; border-radius: 12px; font-weight: 600; cursor: pointer; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <nav>
        <div class="logo">TaskFamily</div>
        <div class="nav-buttons">
            <button class="btn-login" onclick="openAuth('login')">Giriş</button>
            <button class="btn-register" onclick="openAuth('register')">Kaydol</button>
        </div>
    </nav>

    <div id="landing-page">
        <section class="hero">
            <h1>Aile İçi Düzeni Birlikte İnşa Edin</h1>
            <p style="margin-top:10px; color:#64748b;">Sorumluluk kazandıran eğlenceli görev takip sistemi.</p>
            <button class="btn-register" style="padding: 1rem 2rem; margin-top: 20px;" onclick="openAuth('register')">Hemen Başlayın</button>
        </section>
    </div>

    <div id="authModal" class="modal-overlay">
        <div class="auth-container">
            <button class="close-btn" onclick="closeAuth()">×</button>
            
            <div id="register-form">
                <h2>Ebeveyn </h2>
                <p style="margin-bottom:15px; font-size:0.9rem; color:#666;">Kod gönderimi için e-postanızı girin.</p>
                <input type="email" id="reg-email" placeholder="E-posta Adresiniz">
                <input type="password" id="reg-pass" placeholder="Şifreniz">
                <button type="button" class="submit-btn" onclick="handleRegister()">Kod Gönder</button>
            </div>

            <div id="verify-form" class="hidden">
                <h2>Kodu Onayla</h2>
                <p style="margin-bottom:15px; font-size:0.9rem; color:#666;">Mailinize gelen 6 haneli kodu giriniz.</p>
                <input type="text" id="v-code" placeholder="000000" style="text-align: center; letter-spacing: 4px; font-weight: bold;">
                <button type="button" class="submit-btn" onclick="handleVerify()">Hesabı Aktifleştir</button>
            </div>

            <div id="login-form" class="hidden">
                <h2>Hoş Geldiniz</h2>
                <p style="margin-bottom:15px; font-size:0.9rem; color:#666;">Giriş yapmak için bilgilerinizi kullanın.</p>
                <input type="email" id="log-email" placeholder="E-posta">
                <input type="password" id="log-pass" placeholder="Şifre">
                <button type="button" class="submit-btn" onclick="handleLogin()">Giriş Yap</button>
            </div>
        </div>
    </div>

    <script>
            let savedEmail = "";

    function openAuth(type) {
        const modal = document.getElementById('authModal');
        if (modal) {
            modal.style.display = 'flex';
            document.getElementById('register-form').classList.toggle('hidden', type !== 'register');
            document.getElementById('login-form').classList.toggle('hidden', type !== 'login');
            document.getElementById('verify-form').classList.add('hidden');
        }
    }

    function closeAuth() {
        document.getElementById('authModal').style.display = 'none';
    }

    async function handleRegister() {
        // Form verilerini al
        const emailInput = document.getElementById('reg-email');
        const passInput = document.getElementById('reg-pass');
        
        if (!emailInput || !passInput) return;

        const email = emailInput.value.trim();
        const password = passInput.value.trim();

        if (!email || !password) {
            alert("Lütfen e-posta ve şifre giriniz.");
            return;
        }

        try {
            console.log("Kayıt isteği gönderiliyor...");
            const response = await fetch('/register', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, password })
            });

            const data = await response.json();
            
            if (data.success) {
                savedEmail = email;
                alert("Doğrulama kodu gönderildi!");
                document.getElementById('register-form').classList.add('hidden');
                document.getElementById('verify-form').classList.remove('hidden');
            } else {
                alert("Hata: " + (data.error || data.message));
            }
        } catch (err) {
            console.error("Fetch Hatası:", err);
            alert("Sunucuya bağlanılamadı. Lütfen internetinizi veya sunucuyu kontrol edin.");
        }
    }

    async function handleVerify() {
        const codeInput = document.getElementById('v-code');
        if (!codeInput) return;
        
        const code = codeInput.value.trim();
        if(!code) return alert("Lütfen kodu girin.");

        try {
            const res = await fetch('/verify-code', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email: savedEmail, code })
            });
            const data = await res.json();
            
            if(data.success) {
                alert("Hesabınız doğrulandı! Giriş yapabilirsiniz.");
                openAuth('login');
            } else { 
                alert(data.message || "Kod hatalı!"); 
            }
        } catch (error) {
            alert("Doğrulama hatası.");
        }
    }

    async function handleLogin() {
    const email = document.getElementById('log-email').value.trim(); // Boşlukları temizler
    const password = document.getElementById('log-pass').value;

    if (!email || !password) {
        alert("Lütfen tüm alanları doldurun.");
        return;
    }

    try {
        const res = await fetch('/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email, password })
        });
        
        const data = await res.json();

        if (data.success) { 
            // Bilgileri tarayıcıya kaydet
            localStorage.setItem('userId', data.userId); 
            localStorage.setItem('userRole', data.role);
            localStorage.setItem('userEmail', data.email);
            localStorage.setItem('isFirstLogin', data.isFirstLogin)

            alert("Giriş başarılı! Yönlendiriliyorsunuz...");
            
            if (data.role === 'parent') {
                window.location.href = '/dashboard.html';
            } else {
                // Çocuğu mail parametresiyle birlikte gönderiyoruz
                window.location.href = `/child-tasks.html?email=${encodeURIComponent(data.email)}`;
            }
        } else { 
            // 401 hatası aldığında buradaki mesaj görünür
            alert(data.message || "E-posta veya şifre hatalı!"); 
        }
    } catch (error) {
        console.error("Login hatası:", error);
        alert("Sunucuya bağlanırken bir hata oluştu.");
    }
}

    window.onclick = function(event) {
        const modal = document.getElementById('authModal');
        if (event.target == modal) closeAuth();
    }
    </script>
</body>
</html>
