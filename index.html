<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TaskFamily | Akıllı Görev Takibi</title>
    <style>
        :root { --primary: #4f46e5; --primary-hover: #4338ca; --bg: #f8fafc; --text-main: #1e293b; --text-muted: #64748b; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background-color: var(--bg); color: var(--text-main); }
        nav { background: white; padding: 1rem 10%; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #e2e8f0; position: sticky; top: 0; z-index: 1000; }
        .logo { font-size: 1.5rem; font-weight: 800; color: var(--primary); }
        .nav-buttons button { padding: 0.6rem 1.2rem; margin-left: 0.8rem; border-radius: 10px; cursor: pointer; border: none; font-weight: 600; }
        .btn-login { background: transparent; }
        .btn-register { background: var(--primary); color: white; }
        .hero { padding: 100px 10%; text-align: center; }
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); display: none; justify-content: center; align-items: center; z-index: 2000; }
        .auth-container { background: white; padding: 2.5rem; border-radius: 20px; width: 100%; max-width: 400px; position: relative; }
        .close-btn { position: absolute; top: 1rem; right: 1rem; cursor: pointer; font-size: 1.5rem; border: none; background: none; }
        input { width: 100%; padding: 0.8rem; margin-bottom: 1rem; border: 1px solid #ddd; border-radius: 10px; }
        .submit-btn { width: 100%; padding: 0.9rem; background: var(--primary); color: white; border: none; border-radius: 10px; cursor: pointer; font-weight: 600; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <nav>
        <div class="logo">TaskFamily</div>
        <div class="nav-buttons">
            <button class="btn-login" onclick="openAuth('login')">Giriş</button>
            <button class="btn-register" onclick="openAuth('register')">Kaydol</button>
        </div>
    </nav>

    <section class="hero">
        <h1>Aile İçi Düzeni Birlikte İnşa Edin</h1>
        <button class="btn-register" style="padding: 1rem 2rem; margin-top: 20px;" onclick="openAuth('register')">Hemen Başla</button>
    </section>

    <div id="authModal" class="modal-overlay">
        <div class="auth-container">
            <button class="close-btn" onclick="closeAuth()">×</button>
            
            <div id="register-form">
                <h2>Ebeveyn Kaydı</h2>
                <p style="margin-bottom:1rem; color:#666;">Bilgilerinizi giriniz.</p>
                <input type="email" id="reg-email" placeholder="E-posta">
                <input type="password" id="reg-pass" placeholder="Şifre">
                <button type="button" class="submit-btn" onclick="handleRegister()">Kod Gönder</button>
            </div>

            <div id="verify-form" class="hidden">
                <h2>Kodu Onayla</h2>
                <p style="margin-bottom:1rem; color:#666;">Mailinize gelen 6 haneli kodu girin.</p>
                <input type="text" id="v-code" placeholder="000000" style="text-align:center; letter-spacing:4px;">
                <button type="button" class="submit-btn" onclick="handleVerify()">Onayla</button>
            </div>

            <div id="login-form" class="hidden">
                <h2>Giriş Yap</h2>
                <input type="email" id="log-email" placeholder="E-posta">
                <input type="password" id="log-pass" placeholder="Şifre">
                <button type="button" class="submit-btn" onclick="handleLogin()">Giriş</button>
            </div>
        </div>
    </div>

    <script>
        let savedEmail = "";

        // Sayfa yüklenince test (Alert gelmiyorsa dosya bozuktur)
        window.onload = function() {
            console.log("Script çalışıyor...");
        };

        function openAuth(type) {
            document.getElementById('authModal').style.display = 'flex';
            document.getElementById('register-form').classList.toggle('hidden', type !== 'register');
            document.getElementById('login-form').classList.toggle('hidden', type !== 'login');
            document.getElementById('verify-form').classList.add('hidden');
        }

        function closeAuth() {
            document.getElementById('authModal').style.display = 'none';
        }

        async function handleRegister() {
            const email = document.getElementById('reg-email').value;
            const password = document.getElementById('reg-pass').value;

            if (!email || !password) return alert("Eksik bilgi!");

            try {
                const res = await fetch('/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password, role: 'parent' })
                });
                const data = await res.json();
                
                if (data.success) {
                    savedEmail = email;
                    alert("Kod gönderildi!");
                    document.getElementById('register-form').classList.add('hidden');
                    document.getElementById('verify-form').classList.remove('hidden');
                } else {
                    alert("Hata: " + (data.error || data.message));
                }
            } catch (err) {
                alert("Sunucuya bağlanılamadı!");
            }
        }

        async function handleVerify() {
            const code = document.getElementById('v-code').value;
            if (!code) return alert("Kodu girin!");

            try {
                const res = await fetch('/verify-code', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email: savedEmail, code })
                });
                const data = await res.json();

                if (data.success) {
                    alert("Hesap onaylandı! Giriş yapabilirsiniz.");
                    openAuth('login');
                } else {
                    alert(data.message || "Kod hatalı!");
                }
            } catch (err) {
                alert("Doğrulama hatası!");
            }
        }

        async function handleLogin() {
            const email = document.getElementById('log-email').value;
            const password = document.getElementById('log-pass').value;

            try {
                const res = await fetch('/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });
                const data = await res.json();

                if (data.success) {
                    localStorage.setItem('userId', data.userId);
                    window.location.href = data.role === 'child' ? `/child-login?email=${email}` : "/dashboard.html";
                } else {
                    alert(data.message || "Giriş başarısız!");
                }
            } catch (err) {
                alert("Giriş hatası!");
            }
        }

        window.onclick = function(event) {
            if (event.target == document.getElementById('authModal')) closeAuth();
        }
    </script>
</body>
</html>
